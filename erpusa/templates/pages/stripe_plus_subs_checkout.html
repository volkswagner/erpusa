{% extends "templates/web.html" %}

{% block title %} Stripe Subscription {% endblock %}
{%- block header -%}
    <link rel="stylesheet" href="stripe_plus_style.css">
{% endblock %}
{% block script %}
    <script src="https://js.stripe.com/v3/"></script>
    <script>{% include "templates/includes/stripe_plus_subs_checkout.js" %}</script>
{% endblock %}
{% block page_content %}
  <div class="py-5 my-5"></div>
  <div class="d-flex flex-column p-1 p-xl-5 w-100 h-100 d-flex align-items-center justify-content-start">
    {% if header_image %}
        <img src="{{ header_image }}" alt="{{ company }} logo" width="150">
        <small class="font-weight-bold mt-3" style="font-family: Georgia, serif;">{{ company }}</small>
    {% else %}
        <h2 class="h3 font-weight-bold" alt="{{ company }} logo" style="font-family: Georgia, serif;">{{ company }}</h2>
    {% endif %}
    <hr class="w-50"/>
  </div>
  <div id="checkout">
    <!-- Checkout will insert the payment form here -->
  </div>
  <div class="py-5 my-5"></div>
{% endblock %}
