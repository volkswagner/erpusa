
<table class="report-title" border="0" cellpadding="0" cellspacing="0" width="100%">
	<tr>
		<td>
			<b>{{ title }}</b>
		</td>
	</tr>
	<tr>
		<td>
			<p>
				{{ description }}
			</p>
		</td>
	</tr>
</table>
<table class="table table-bordered text-medium" cellpadding="0" cellspacing="0" border="0">
	<thead>
		<tr>
			<th> ID </th>
			<th> Merchant </th>
			<th> Merchant Transaction ID </th>
			<th> Customer </th>
			<th class="text-right"> Gross Amount </th>
		</tr>
	</thead>
	<tbody>
		<tr>
			<td> {{ id }}</td>
			<td> {{ merchant }}</td>
			<td> {{ merchant_transaction_id }}</td>
			<td> {{ customer }}</td>
			<td class="text-right"> {{ gross_amount }}</td>
		</tr>
	</tbody>
</table>
